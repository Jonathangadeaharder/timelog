<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Timelog">
  <title>Timelog</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <g transform="translate(512,512)">
    <circle r="280" fill="none" stroke="url(#accent)" stroke-width="32"/>
    <circle r="12" fill="#c084fc"/>
    <line x1="0" y1="0" x2="0" y2="-200" stroke="#e0e7ff" stroke-width="24" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="130" y2="-70" stroke="#818cf8" stroke-width="18" stroke-linecap="round"/>
    <g transform="translate(240, 180)">
      <rect x="-30" y="-60" width="60" height="80" rx="30" fill="url(#accent)"/>
      <rect x="-40" y="30" width="80" height="14" rx="7" fill="#818cf8" opacity="0.7"/>
      <line x1="0" y1="44" x2="0" y2="70" stroke="#818cf8" stroke-width="6" stroke-linecap="round"/>
      <line x1="-20" y1="70" x2="20" y2="70" stroke="#818cf8" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>
</svg>
