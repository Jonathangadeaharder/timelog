root: true

exclude:
  - "**/__pycache__/**"
  - .git/**
  - .venv/**
  - "*.egg-info/**"
  - .pytest_cache/**
  - .ruff_cache/**
  - .mypy_cache/**
  - dist/**

rules:
  deploy-action: false
  mandatory-linters:
    - structurelint
    - pytest-linter
  max-depth:
    max: 5
    exemptions:
      - ".git/**"
      - "**/__pycache__/**"

  max-files-in-dir:
    max: 30

  max-subdirs:
    max: 15

  file-existence:
    "README.md":
      rule: "exists:1"

  disallowed-patterns:
    - "*.tmp"
    - "*.bak"
    - ".DS_Store"
    - "*.pyc"
    - "*.pyo"


