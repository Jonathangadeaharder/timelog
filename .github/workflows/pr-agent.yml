name: PR-Agent

on:
  issue_comment:
    types: [created, edited]

jobs:
  pr-agent:
    runs-on: self-hosted
    if: vars.ENABLE_PR_AGENT == 'true' && github.event.issue.pull_request != null
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        run: python3.13 -m venv /tmp/pr-agent-venv-py313 && /tmp/pr-agent-venv-py313/bin/pip install pr-agent

      - name: Run PR-Agent
        env:
          OPENAI.KEY: ${{ secrets.LM_STUDIO_API_KEY }}
          OPENAI.API_BASE: http://localhost:1234/v1
          CONFIG.MODEL: openai/qwen3.6-27b-mlx
          GITHUB.TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT="${{ github.event.comment.body }}"
          if echo "$COMMENT" | grep -qE '^/(review|describe|improve|ask)'; then
            /tmp/pr-agent-venv-py313/bin/pr-agent --pr-url "https://github.com/${{ github.repository }}/pull/${{ github.event.issue.number }}" $COMMENT
          fi
