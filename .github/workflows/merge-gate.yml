name: Merge Gate

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: merge-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pr-gate:
    uses: ./.github/workflows/pr-gate.yml

  codeql:
    name: CodeQL Security
    runs-on: [self-hosted, macOS, ARM64]
    needs: pr-gate
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3

  e2e:
    name: E2E Tests
    runs-on: [self-hosted, macOS, ARM64]
    needs: pr-gate
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install

      - name: Build
        run: pnpm run build

      - name: E2E Tests
        run: pnpm run test:e2e

  sonarcloud:
    name: SonarCloud Code Analysis
    runs-on: [self-hosted, macOS, ARM64]
    needs: pr-gate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install SonarScanner
        run: brew install sonar-scanner
      - name: SonarCloud Scan
        run: sonar-scanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  merge-ok:
    name: Merge Gate
    runs-on: [self-hosted, macOS, ARM64]
    needs: [pr-gate, codeql, e2e, sonarcloud]
    if: always()
    steps:
      - name: Check all gates passed
        run: |
          FAILED=0
          [ "${{ needs.pr-gate.result }}" != "success" ] && FAILED=1
          [ "${{ needs.codeql.result }}" != "success" ] && FAILED=1
          [ "${{ needs.e2e.result }}" != "success" ] && FAILED=1
          if [ "${{ needs.sonarcloud.result }}" != "success" ] && [ "${{ needs.sonarcloud.result }}" != "skipped" ]; then
            FAILED=1
          fi
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more gates failed"
            exit 1
          fi
          echo "All merge gate jobs passed."
