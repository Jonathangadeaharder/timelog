name: Cache Warm

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  warm:
    runs-on: ["self-hosted", "python", "macos"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Warm cache
        run: uv sync --dev
