name: PR Gate

on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Check for iCloud sync conflicts
        run: |
          if find . -path ./.venv -prune -o -path ./.git -prune -o -path ./node_modules -prune -o -name "* [0-9]*" -print | grep -q .; then
            echo "::error::iCloud sync conflicts detected"
            find . -path ./.venv -prune -o -path ./.git -prune -o -path ./node_modules -prune -o -name "* [0-9]*" -print
            exit 1
          fi

  python-quality:
    name: Python Quality
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pyright
        run: uv run pyright

      - name: Tests with coverage gate
        run: uv run pytest --cov --cov-branch --cov-fail-under=90

  sveltekit-quality:
    name: SvelteKit Quality
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run check

      - name: Test + Coverage
        run: pnpm run test:coverage

      - name: Build
        run: pnpm run build

  dependency-scan:
    name: Dependency Scan
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  secret-scanning:
    name: Secret Scanning
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  structure:
    name: Repository Structure
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build structurelint
        run: |
          git clone --depth 1 https://github.com/Jonathangadeaharder/structurelint.git /tmp/structurelint
          cd /tmp/structurelint && go build -o /usr/local/bin/structurelint ./cmd/structurelint
      - name: Run structurelint
        run: structurelint .
      - name: Cleanup structurelint build
        if: always()
        run: rm -rf /tmp/structurelint

  pytest-lint:
    name: Test Quality (pytest)
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
      - uses: Jonathangadeaharder/pytest-linter@v1

  required-checks:
    name: Required Checks (PR)
    runs-on: [self-hosted, macOS, ARM64]
    needs:
      - repo-hygiene
      - python-quality
      - sveltekit-quality
      - dependency-scan
      - secret-scanning
      - structure
      - pytest-lint
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          FAILED=0
          [ "${{ needs.repo-hygiene.result }}" != "success" ] && FAILED=1
          [ "${{ needs.python-quality.result }}" != "success" ] && FAILED=1
          [ "${{ needs.sveltekit-quality.result }}" != "success" ] && FAILED=1
          [ "${{ needs.dependency-scan.result }}" != "success" ] && FAILED=1
          [ "${{ needs.secret-scanning.result }}" != "success" ] && FAILED=1
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more PR gate jobs failed."
            exit 1
          fi
          echo "All PR gate jobs passed."
